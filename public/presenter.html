<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Voice Presenter 🎙️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .presenter-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .slide {
            display: none;
            padding: 80px 40px;
            min-height: 600px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            text-align: center;
            animation: slideIn 0.5s ease-in-out;
        }

        .slide.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .slide h1 {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .slide p {
            font-size: 1.5em;
            color: #555;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .slide .voice-indicator {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 40px;
        }

        .voice-indicator .bar {
            width: 4px;
            height: 30px;
            background: #667eea;
            border-radius: 2px;
            animation: soundWave 0.6s ease-in-out infinite;
        }

        .voice-indicator .bar:nth-child(2) {
            animation-delay: 0.1s;
        }

        .voice-indicator .bar:nth-child(3) {
            animation-delay: 0.2s;
        }

        .voice-indicator .bar:nth-child(4) {
            animation-delay: 0.3s;
        }

        .voice-indicator .bar:nth-child(5) {
            animation-delay: 0.4s;
        }

        @keyframes soundWave {
            0%, 100% {
                height: 10px;
            }
            50% {
                height: 40px;
            }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            background: #333;
            gap: 20px;
        }

        .slide-counter {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .prev-btn, .next-btn {
            background: #667eea;
        }

        .prev-btn:hover, .next-btn:hover {
            background: #764ba2;
        }

        .prev-btn:disabled, .next-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .mute-btn {
            background: #ff6b6b;
            min-width: 100px;
        }

        .mute-btn.unmuted {
            background: #51cf66;
        }

        .mute-btn:hover {
            background: #ff5252;
        }

        .mute-btn.unmuted:hover {
            background: #40c057;
        }

        @media (max-width: 600px) {
            .slide {
                padding: 40px 20px;
                min-height: auto;
            }

            .slide h1 {
                font-size: 2em;
            }

            .slide p {
                font-size: 1.1em;
            }

            .controls {
                flex-direction: column;
                padding: 20px;
            }

            .button-group {
                width: 100%;
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="presenter-container">
        <!-- Slide 1 -->
        <div class="slide active">
            <h1>🎤 Welcome</h1>
            <p>Slide 1 - Listen to the voice...</p>
            <div class="voice-indicator">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <!-- Slide 2 -->
        <div class="slide">
            <h1>📊 Analysis</h1>
            <p>Slide 2 - Hear what's next...</p>
            <div class="voice-indicator">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <!-- Slide 3 -->
        <div class="slide">
            <h1>🚀 Strategy</h1>
            <p>Slide 3 - Keep listening...</p>
            <div class="voice-indicator">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <!-- Slide 4 -->
        <div class="slide">
            <h1>✨ The End</h1>
            <p>Slide 4 - Final words...</p>
            <div class="voice-indicator">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="prev-btn" onclick="previousSlide()">← Previous</button>
            <div class="slide-counter">
                <span id="current-slide">1</span> / 4
            </div>
            <button class="next-btn" onclick="nextSlide()">Next →</button>
            <button class="mute-btn unmuted" id="mute-btn" onclick="toggleMute()">🔊 Unmute</button>
        </div>
    </div>

    <audio id="slide-audio" preload="auto"></audio>

    <script>
        let currentSlide = 1;
        let isMuted = false;
        const audio = document.getElementById('slide-audio');
        const muteBtn = document.getElementById('mute-btn');

        const slides = [
            { title: 'Slide 1', audio: './presenter_voice/slide1.ogg' },
            { title: 'Slide 2', audio: './presenter_voice/slide2.ogg' },
            { title: 'Slide 3', audio: './presenter_voice/slide3.ogg' },
            { title: 'Slide 4', audio: './presenter_voice/slide4.ogg' }
        ];

        function showSlide(n) {
            if (n < 1) currentSlide = 1;
            if (n > 4) currentSlide = 4;

            document.querySelectorAll('.slide').forEach(slide => {
                slide.classList.remove('active');
            });

            document.querySelectorAll('.slide')[currentSlide - 1].classList.add('active');
            document.getElementById('current-slide').textContent = currentSlide;

            // Stop current audio and play new one
            audio.pause();
            if (!isMuted) {
                audio.src = slides[currentSlide - 1].audio;
                audio.play().catch(err => {
                    console.error('Audio play failed:', err);
                });
            }

            // Update button states
            document.querySelector('.prev-btn').disabled = currentSlide === 1;
            document.querySelector('.next-btn').disabled = currentSlide === 4;
        }

        function nextSlide() {
            currentSlide++;
            showSlide(currentSlide);
        }

        function previousSlide() {
            currentSlide--;
            showSlide(currentSlide);
        }

        function toggleMute() {
            isMuted = !isMuted;
            if (isMuted) {
                audio.pause();
                muteBtn.textContent = '🔇 Muted';
                muteBtn.classList.remove('unmuted');
            } else {
                muteBtn.textContent = '🔊 Unmute';
                muteBtn.classList.add('unmuted');
                audio.play().catch(err => {
                    console.error('Audio play failed:', err);
                });
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') previousSlide();
            if (e.key === 'ArrowRight') nextSlide();
        });

        // Initialize
        showSlide(currentSlide);
    </script>
</body>
</html>
