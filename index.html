        // Utility: Convert Raw PCM to WAV blob URI
        function pcmToWav(base64Data, mimeType) {
            const binaryString = window.atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);

            let sampleRate = 24000;
            const rateMatch = mimeType.match(/rate=(\d+)/);
            if (rateMatch && rateMatch[1]) sampleRate = parseInt(rateMatch[1], 10);

            const buffer = new ArrayBuffer(44 + bytes.length);
            const view = new DataView(buffer);
            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + bytes.length, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, bytes.length, true);

            const audioData = new Uint8Array(buffer, 44);
            audioData.set(bytes);
            return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
        }

        function App() {

        const [hoveredSlice, setHoveredSlice] = useState(null);
        const [notification, setNotification] = useState(null);

        // Security States
        const [isAuthenticated, setIsAuthenticated] = useState(false);
        const [accessCode, setAccessCode] = useState('');
        const [authError, setAuthError] = useState('');

        // Audio States
        const [currentSlideIndex, setCurrentSlideIndex] = useState(0);
        const [isPlayingBriefing, setIsPlayingBriefing] = useState(false);
        const [isGeneratingSpeech, setIsGeneratingSpeech] = useState(false);
        const [briefingProgress, setBriefingProgress] = useState(0);
        const [audioSpeed, setAudioSpeed] = useState(1);
        const [activeSpeechHost, setActiveSpeechHost] = useState('Syed');
        const [autoPlayOnPageTurn, setAutoPlayOnPageTurn] = useState(true);
        const isInitialRender = useRef(true);
        
        const [cachedAudioURIs, setCachedAudioURIs] = useState({});
        const audioRef = useRef(null); 
        const [imageLoaded, setImageLoaded] = useState(true); 
        
        // Helper to show custom micro-notifications
        const showNotification = (message, type = 'success') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 4000);
        };

        // --- ENHANCED API LOGIC DENGAN EXPONENTIAL BACKOFF KEMBALI KEPADA ASAL ---
        const callTtsWithRetry = async (payload, retries = 5, delay = 1000) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        return await response.json();
                    }
                    if (!response.ok) throw new Error("Status API: " + response.status);
                } catch (err) {
                   // Retry sekiranya pelayan sibuk (rate limit/503)
                }
                await new Promise(res => setTimeout(res, delay));
                delay *= 2; // Masa menunggu digandakan setiap kali percubaan gagal
            }
            throw new Error("Gagal menjana suara AI. Pelayan terlalu sibuk pada ketika ini.");
        };

        const loadSlideAudio = async (slideIndex) => {
            if (cachedAudioURIs[slideIndex]) return cachedAudioURIs[slideIndex];

            setIsGeneratingSpeech(true);
            const slide = SLIDES_DATA[slideIndex];
            const concatenatedDialogue = slide.podcasts.map(p => `${p.speaker}: ${p.text}`).join("\n");

            const ttsPayload = {
                contents: [{ parts: [{ text: `Sampaikan taklimat ini dengan sebutan Bahasa Melayu yang formal, jelas, dan profesional: \n\n${concatenatedDialogue}` }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { multiSpeakerVoiceConfig: { speakerVoiceConfigs: [
                        { speaker: "Syed", voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } },
                        { speaker: "Sarah", voiceConfig: { prebuiltVoiceConfig: { voiceName: "Leda" } } }
                    ]}}
                },
                model: "gemini-2.5-flash-preview-tts"
            };

            try {
                const data = await callTtsWithRetry(ttsPayload);
                const audioPart = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                if (!audioPart || !audioPart.inlineData?.data) throw new Error("Tiada data suara dari AI.");

                const rawBase64 = audioPart.inlineData.data;
                const mimeType = audioPart.inlineData.mimeType || "audio/L16;rate=24000";
                const wavUri = pcmToWav(rawBase64, mimeType);
                
                setCachedAudioURIs(prev => ({...prev, [slideIndex]: wavUri}));
                setIsGeneratingSpeech(false);
                return wavUri;
            } catch (err) {
                setIsGeneratingSpeech(false);
                showNotification(err.message, "warning");
                return null; 
            }
        };

        // Playback Controller Utama
        const forceStartPlayback = async () => {
            if (audioRef.current) audioRef.current.pause();
            
            let targetUri = cachedAudioURIs[currentSlideIndex];
            if (!targetUri) {
                targetUri = await loadSlideAudio(currentSlideIndex);
            }

            if (targetUri) {
                if (!audioRef.current) audioRef.current = new Audio();
                audioRef.current.src = targetUri;
                audioRef.current.playbackRate = audioSpeed;
                
                audioRef.current.ontimeupdate = () => {
                    if (audioRef.current) {
                        const progress = (audioRef.current.currentTime / audioRef.current.duration) * 100;
                        setBriefingProgress(progress || 0);
                        if (progress > 45) setActiveSpeechHost('Sarah');
                        else setActiveSpeechHost('Syed');
                    }
                };

                audioRef.current.onended = () => {
                    setIsPlayingBriefing(false);
                    setBriefingProgress(0);
                    showNotification("Taklimat slaid selesai!", "success");
                };

                try {
                    await audioRef.current.play();
                    setIsPlayingBriefing(true);
                } catch (playError) {
                    showNotification("Main semula disekat. Sila klik butang 'Main' secara manual.", "warning");

            } else {
                setIsPlayingBriefing(false);
            }

        const togglePlayButton = () => {
            if (isPlayingBriefing) {

                setIsPlayingBriefing(false);

        useEffect(() => {

        const handleSlideChange = (index) => {

        const handleLogin = (e) => {

            if (accessCode === 'KPKM2026' || accessCode === 'kpkm2026') {

                if (window.speechSynthesis) {

            }
        };

        // Auto-play hook
        useEffect(() => {
            if (!isAuthenticated) return; // Tunggu sehingga staf log masuk
            if (isInitialRender.current) {
                isInitialRender.current = false;
                return;
            }
            if (autoPlayOnPageTurn) forceStartPlayback();
        }, [currentSlideIndex, isAuthenticated]);

        useEffect(() => {
            return () => {

            };
        }, []);

        // Dashboard Calcs
        const totals = useMemo(() => {
            let approved = 0; let draft = 0; let pending = 0; let amendment = 0; let noInfo = 0; let target = 0;

            departments.forEach(dept => {
                approved += dept.approved; draft += dept.draft; pending += dept.pending;

            });

            const finalTarget = targetSystem === '1539' ? 1539 : target;
            const completionRate = approved === 348 ? "22.61" : ((approved / finalTarget) * 100).toFixed(2);
            
            let statusLabel = "Kritikal / Tindakan Segera";
            let statusColor = "bg-rose-50 border-rose-200 text-rose-700";
            let progressBg = "bg-rose-600";
            
            if (completionRate >= 80) {
                statusLabel = "Cemerlang / Tahniah"; statusColor = "bg-emerald-50 border-emerald-200 text-emerald-700"; progressBg = "bg-emerald-600";

            }

            return {
                approved, draft, pending, amendment, noInfo, target: finalTarget,
                completionRate, statusLabel, statusColor, progressBg, unfinished: finalTarget - approved
            };
        }, [departments, targetSystem]);

        const categories = ['Semua', 'Bahagian', 'IADA & Agensi', 'Pejabat', 'Unit', 'Lain-Lain'];

                return matchesSearch && matchesCategory;
            });

            return departments.filter(d => d.approved < d.target).map(d => ({

                        {totals.completionRate}% Penyelesaian
                        </span>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm p-5 border border-slate-100 relative overflow-hidden group">
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Baki Belum Selesai</p>
                        <h3 className="text-2xl font-black text-slate-800 mt-1">{totals.unfinished.toLocaleString()}</h3>
                        <span className="inline-flex items-center gap-0.5 text-[9px] font-semibold text-rose-600 mt-2 bg-rose-50 px-2 py-0.5 rounded-full">
                        {((totals.unfinished / totals.target) * 100).toFixed(1)}% Dalam Tindakan
                        </span>
                    </div>

                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    
                    <div className="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm flex flex-col justify-between">
                        <div>
                        <h4 className="text-xs font-black text-slate-800 uppercase tracking-wider flex items-center gap-1.5">
                            <span className="w-2.5 h-2.5 rounded-full bg-emerald-600"></span>
                            Chart 1: Status Aliran Kerja
                        </h4>
                        <p className="text-[10px] text-slate-400 mt-0.5">Pengagihan status kualitatif fail portfolio semasa.</p>
                        </div>

                        <div className="flex flex-col items-center justify-center py-4 relative">
                        <svg width="140" height="140" viewBox="0 0 100 100" className="transform -rotate-90">
                            <circle cx="50" cy="50" r="38" stroke="#f1f5f9" strokeWidth="12" fill="transparent" />
                            {(() => {
                            let cumulativePercentage = 0;
                            return donutData.map((slice, index) => {
                                const percentage = parseFloat(slice.percentage);
                                const dashArray = `${percentage} ${100 - percentage}`;
                                const dashOffset = 100 - cumulativePercentage + 25; 
                                cumulativePercentage += percentage;
                                return ( <circle key={index} cx="50" cy="50" r="38" stroke={slice.color} strokeWidth={hoveredSlice === index ? 15 : 12} strokeDasharray={dashArray} strokeDashoffset={dashOffset} strokeLinecap="round" fill="transparent" pathLength="100" className="transition-all duration-300 cursor-pointer" onMouseEnter={() => setHoveredSlice(index)} onMouseLeave={() => setHoveredSlice(null)} /> );
                            });
                            })()}
                        </svg>
                        <div className="absolute flex flex-col items-center justify-center text-center">
                            <span className="text-[10px] font-bold text-slate-400">Penyelesaian</span>
                            <span className="text-lg font-black text-slate-800">{totals.completionRate}%</span>
                        </div>
                        </div>

                        <div className="grid grid-cols-2 gap-1.5 text-[9px] pt-2 border-t border-slate-50">
                        {donutData.map((slice, idx) => (
                            <div key={idx} className="flex items-center gap-1">
                            <span className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: slice.color }}></span>
                            <span className="text-slate-500 truncate">{slice.name}: <strong>{slice.value}</strong></span>
                            </div>
                        ))}
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm flex flex-col justify-between">
                        <div>
                        <h4 className="text-xs font-black text-slate-800 uppercase tracking-wider flex items-center gap-1.5">
                            <span className="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
                            Chart 2: Sasaran vs. Kelulusan
                        </h4>
                        <p className="text-[10px] text-slate-400 mt-0.5">Perbandingan jurang siap mengikut kumpulan sasaran utama.</p>
                        </div>

                        <div className="space-y-3.5 my-3">
                        {filteredDepartments.slice(0, 4).map((dept) => {
                            const completedPct = ((dept.approved / dept.target) * 100).toFixed(0);
                            return (
                            <div key={dept.id} className="space-y-1">
                                <div className="flex items-center justify-between text-[10px]">
                                <span className="font-bold text-slate-700 truncate max-w-[150px]">{dept.name}</span>
                                <span className="font-semibold text-slate-900">{completedPct}%</span>
                                </div>
                                <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden relative">
                                <div style={{ width: `${completedPct}%` }} className="h-full bg-emerald-500 transition-all duration-500" />
                                </div>
                            </div>
                            );
                        })}
                        </div>

                        <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-100 text-[10px] text-slate-500">
                        <span className="font-bold text-slate-700 block mb-0.5">Saranan Urus Setia:</span>
                        Fokus intervensi zon utama perlu diberi kepada jabatan yang mempunyai bar kemajuan di bawah paras 50%.
                        </div>
                    </div>

                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    
                    <div className="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm flex flex-col justify-between">
                        <div>
                        <h4 className="text-xs font-black text-slate-800 uppercase tracking-wider flex items-center gap-1.5">
                            <span className="w-2.5 h-2.5 rounded-full bg-teal-600"></span>
                            Chart 3: Unit Cemerlang (100% Siap)
                        </h4>
                        <p className="text-[10px] text-slate-400 mt-0.5">Unit yang mencapai kejayaan penyelesaian penuh sasaran.</p>
                        </div>

                        <div className="grid grid-cols-3 gap-2.5 my-3">
                        {stellarPerformers.slice(0, 3).map((unit) => (
                            <div key={unit.id} className="p-2.5 rounded-xl bg-emerald-50/40 border border-emerald-100 text-center relative">
                            <i className="fa-solid fa-check text-[14px] text-emerald-600 absolute top-1 right-1"></i>
                            <h5 className="text-[9px] font-extrabold text-slate-700 line-clamp-1">{unit.name}</h5>
                            <span className="text-lg font-black text-emerald-800 block mt-1">{unit.target}</span>
                            <span className="text-[8px] uppercase tracking-wider text-emerald-600 block">Selesai</span>
                            </div>
                        ))}
                        </div>

                        <p className="text-[9.5px] text-slate-400 italic">
                        * Unit-unit di atas boleh dijadikan penanda aras amalan terbaik bagi penyediaan portfolio KPKM.
                        </p>
                    </div>

                    <div className="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm flex flex-col justify-between">
                        <div>
                        <h4 className="text-xs font-black text-slate-800 uppercase tracking-wider flex items-center gap-1.5">
                            <span className="w-2.5 h-2.5 rounded-full bg-rose-600"></span>
                            Chart 4: Fokus Utama & Backlog
                        </h4>
                        <p className="text-[10px] text-slate-400 mt-0.5">Baki sasaran terbesar yang memerlukan sokongan luar.</p>
                        </div>

                        <div className="space-y-2 my-2">
                        {focusAreas.slice(0, 2).map((area) => (
                            <div key={area.id} className="p-2 rounded-xl bg-rose-50/30 border border-rose-100 flex items-center justify-between">
                            <div className="min-w-0">
                                <h5 className="text-[10px] font-bold text-slate-700 truncate">{area.name}</h5>
                                <span className="text-[8px] text-slate-400">Jumlah Sasaran: {area.target}</span>
                            </div>
                            <span className="text-[10px] font-extrabold text-rose-700 shrink-0">{area.backlog} Baki</span>
                            </div>
                        ))}
                        </div>

                        <p className="text-[9.5px] text-slate-400 italic">
                        * Kawasan cawangan luar bandar (IADA) memegang peratusan backlog tertinggi kementerian.
                        </p>
                    </div>

                    </div>

                    <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                    <div className="px-6 py-4 border-b border-slate-50 bg-slate-50/50 flex items-center justify-between">
                        <span className="text-xs font-black text-slate-800 uppercase tracking-wider">Senarai Semasa Sektor/Bahagian</span>
                        <span className="text-[10px] bg-amber-100 text-amber-800 font-bold px-2 py-0.5 rounded">MOD SIMULASI BERGERAK</span>
                    </div>

                    <div className="overflow-x-auto max-h-[300px] overflow-y-auto">
                        <table className="w-full text-left text-xs border-collapse">
                        <thead>
                            <tr className="border-b border-slate-100 bg-slate-100/30 text-slate-400 font-bold uppercase text-[9px] tracking-wider">
                            <th className="py-3 px-4">Sektor / Bahagian</th>
                            <th className="py-3 px-2 text-center">Sasaran</th>
                            <th className="py-3 px-2 text-center text-emerald-700">Lulus</th>
                            <th className="py-3 px-2 text-center text-amber-700">Deraf</th>
                            <th className="py-3 px-2 text-center text-rose-700">Pindaan</th>
                            <th className="py-3 px-2 text-center">Belum Mula</th>
                            <th className="py-3 px-4 text-right">Aksi Simulasi</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-50">
                            {filteredDepartments.map((dept) => {
                            const isStellar = dept.approved === dept.target;
                            return (
                                <tr key={dept.id} className={`hover:bg-slate-50/70 transition ${ selectedDeptId === dept.id ? 'bg-emerald-50/45' : '' }`} onClick={() => setSelectedDeptId(dept.id === selectedDeptId ? null : dept.id)}>
                                <td className="py-3 px-4">
                                    <div className="flex items-center gap-2">
                                    <div className={`w-6 h-6 rounded-lg flex items-center justify-center font-bold text-[10px] shrink-0 ${ isStellar ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600' }`}>
                                        <i className="fa-solid fa-building text-[11px]"></i>
                                    </div>
                                    <span className="font-bold text-slate-700 truncate max-w-[180px]" title={dept.name}>{dept.name}</span>
                                    </div>
                                </td>
                                <td className="py-3 px-2 text-center font-semibold text-slate-600">{dept.target}</td>
                                <td className="py-3 px-2 text-center font-bold text-emerald-600">{dept.approved}</td>
                                <td className="py-3 px-2 text-center font-semibold text-amber-500">{dept.draft}</td>
                                <td className="py-3 px-2 text-center font-semibold text-rose-500">{dept.amendment}</td>
                                <td className="py-3 px-2 text-center font-semibold text-slate-400">{dept.noInfo}</td>
                                <td className="py-3 px-4 text-right" onClick={(e) => e.stopPropagation()}>
                                    <div className="flex items-center justify-end gap-1.5">
                                    <button onClick={() => simulateSubmitDraft(dept.id)} disabled={dept.noInfo === 0} className={`px-2 py-1 rounded text-[9px] font-bold transition ${ dept.noInfo > 0 ? 'bg-slate-100 text-slate-700 hover:bg-slate-200' : 'opacity-30 cursor-not-allowed bg-slate-50 text-slate-300' }`} title="Tambah Deraf Baharu">+ Deraf</button>
                                    <button onClick={() => simulateApproveDraft(dept.id)} disabled={dept.draft === 0} className={`px-2 py-1 rounded text-[9px] font-bold transition ${ dept.draft > 0 ? 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200' : 'opacity-30 cursor-not-allowed bg-slate-50 text-slate-300' }`} title="Sahkan & Luluskan Deraf">✓ Lulus</button>
                                    </div>
                                </td>
                                </tr>
                            );
                            })}
                        </tbody>
                        </table>
                    </div>

                    <div className="p-3 bg-slate-50 border-t border-slate-100 text-[10px] text-slate-400 flex items-center justify-between">
                        <span>Dipaparkan {filteredDepartments.length} rekod ditapis.</span>
                        <span className="text-emerald-700 font-bold hover:underline cursor-pointer" onClick={simulateApproveAllPending}>
                        Luluskan Semua Menunggu Tindakan
                        </span>
                    </div>
                    </div>

                </section>

                </div>

                <footer className="text-center text-xs text-slate-400 py-8 border-t border-slate-200 mt-12 space-y-2">
                <p>© {new Date().getFullYear()} Kementerian Pertanian dan Keterjaminan Makanan (KPKM). Urus Setia MyPortfolio Kebangsaan.</p>
                <p>Paparan data disegerakan secara automatik berasaskan rekod berpusat pentadbiran tertinggi kementerian.</p>
                </footer>

            </main>
            </div>
        );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
