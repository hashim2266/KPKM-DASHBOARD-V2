    <!-- Skrip Keselamatan Tambahan (Halang Right-Click & DevTools) -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
        }
    </script>

            bullets: [

            summary: "Unit mikro persekutuan berjaya mencapai kadar 100% siap dengan cepat, namun cawangan operasi utama (IADA) menghadapi backlog terbesar.",

            { text: "Bengkel Berfokus Zon Wilayah: Menghimpunkan penyedia dan pengesah dalam satu masa bagi kelulusan segera.", highlight: "Zon Wilayah" },

        // BOSS VOICE FILES - REPLACES AI TTS!
        const BOSS_VOICE_FILES = [

            './presenter_voice/slide2.ogg',
            './presenter_voice/slide3.ogg',
            './presenter_voice/slide4.ogg'
        ];

        function App() {
        const [departments, setDepartments] = useState(INITIAL_DEPARTMENTS);
        const [searchQuery, setSearchQuery] = useState('');
        const [selectedCategory, setSelectedCategory] = useState('Semua');
        const [targetSystem, setTargetSystem] = useState('1541');
        const [selectedDeptId, setSelectedDeptId] = useState(null);
        const [hoveredSlice, setHoveredSlice] = useState(null);
        const [notification, setNotification] = useState(null);

        // Security States
        const [isAuthenticated, setIsAuthenticated] = useState(false);
        const [accessCode, setAccessCode] = useState('');
        const [authError, setAuthError] = useState('');

        // Audio States
        const [currentSlideIndex, setCurrentSlideIndex] = useState(0);
        const [isPlayingBriefing, setIsPlayingBriefing] = useState(false);
        const [isGeneratingSpeech, setIsGeneratingSpeech] = useState(false);
        const [briefingProgress, setBriefingProgress] = useState(0);
        const [audioSpeed, setAudioSpeed] = useState(1);
        const [activeSpeechHost, setActiveSpeechHost] = useState('Boss');
        const [autoPlayOnPageTurn, setAutoPlayOnPageTurn] = useState(true);
        const isInitialRender = useRef(true);
        
        const audioRef = useRef(null); 
        const [imageLoaded, setImageLoaded] = useState(true); 
        
        // Helper to show custom micro-notifications
        const showNotification = (message, type = 'success') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 4000);
        };

        // Load and play BOSS voice file directly
        const loadSlideAudio = async (slideIndex) => {
            setIsGeneratingSpeech(true);
            
            try {
                const audioFile = BOSS_VOICE_FILES[slideIndex];
                if (!audioFile) throw new Error("Fail suara tidak ditemui");
                
                setIsGeneratingSpeech(false);
                return audioFile;
            } catch (err) {
                setIsGeneratingSpeech(false);
                showNotification(err.message, "warning");
                return null; 
            }
        };

        // Playback Controller Utama
        const forceStartPlayback = async () => {
            if (audioRef.current) audioRef.current.pause();
            
            const targetUri = await loadSlideAudio(currentSlideIndex);

            if (targetUri) {
                if (!audioRef.current) audioRef.current = new Audio();
                audioRef.current.src = targetUri;
                audioRef.current.playbackRate = audioSpeed;
                
                audioRef.current.ontimeupdate = () => {
                    if (audioRef.current) {
                        const progress = (audioRef.current.currentTime / audioRef.current.duration) * 100;
                        setBriefingProgress(progress || 0);
                    }
                };

                audioRef.current.onended = () => {
                    setIsPlayingBriefing(false);
                    setBriefingProgress(0);
                    showNotification("Taklimat slaid selesai!", "success");
                };

                try {
                    await audioRef.current.play();
                    setIsPlayingBriefing(true);
                } catch (playError) {
                    showNotification("Main semula disekat. Sila klik butang 'Main' secara manual.", "warning");
                }
            } else {
                setIsPlayingBriefing(false);
            }
        };

        const togglePlayButton = () => {
            if (isPlayingBriefing) {
                if (audioRef.current) audioRef.current.pause();
                setIsPlayingBriefing(false);
            } else {
                forceStartPlayback();
            }
        };

        useEffect(() => {
            if (audioRef.current) audioRef.current.playbackRate = audioSpeed;
        }, [audioSpeed]);

        const handleSlideChange = (index) => {
            if (audioRef.current) audioRef.current.pause();
            
            setIsPlayingBriefing(false);
            setBriefingProgress(0);
            setCurrentSlideIndex(index);
        };

        // Pengesahan Akses & Buka Kunci Audio
        const handleLogin = (e) => {
            e.preventDefault();
            // Anda boleh menukar kod rahsia 'KPKM2026' ini kepada apa sahaja yang anda mahu
            if (accessCode === 'KPKM2026' || accessCode === 'kpkm2026') {
                setIsAuthenticated(true);
                // "Trick" pelayar web untuk membenarkan audio selepas pengguna klik butang
                if (window.speechSynthesis) {
                    let dummy = new SpeechSynthesisUtterance('');
                    dummy.volume = 0;
                    window.speechSynthesis.speak(dummy);
                }
                if (!audioRef.current) {
                    audioRef.current = new Audio();
                }
            } else {
                setAuthError('Kod Akses Tidak Sah. Sila rujuk urus setia.');
            }
        };

        // Auto-play hook
        useEffect(() => {
            if (!isAuthenticated) return; // Tunggu sehingga staf log masuk
            if (isInitialRender.current) {
                isInitialRender.current = false;
                return;
            }
            if (autoPlayOnPageTurn) forceStartPlayback();
        }, [currentSlideIndex, isAuthenticated]);

        useEffect(() => {
            return () => {
                if (audioRef.current) audioRef.current.pause();
            };
        }, []);

        // Dashboard Calcs
        const totals = useMemo(() => {
            let approved = 0; let draft = 0; let pending = 0; let amendment = 0; let noInfo = 0; let target = 0;

            departments.forEach(dept => {
                approved += dept.approved; draft += dept.draft; pending += dept.pending;
                amendment += dept.amendment; noInfo += dept.noInfo; target += dept.target;
            });

            const finalTarget = targetSystem === '1539' ? 1539 : target;
            const completionRate = approved === 348 ? "22.61" : ((approved / finalTarget) * 100).toFixed(2);
            
            let statusLabel = "Kritikal / Tindakan Segera";
            let statusColor = "bg-rose-50 border-rose-200 text-rose-700";
            let progressBg = "bg-rose-600";
            
            if (completionRate >= 80) {
                statusLabel = "Cemerlang / Tahniah"; statusColor = "bg-emerald-50 border-emerald-200 text-emerald-700"; progressBg = "bg-emerald-600";
            } else if (completionRate >= 50) {
                statusLabel = "Sederhana / Sila Tingkatkan Usaha"; statusColor = "bg-amber-50 border-amber-200 text-amber-700"; progressBg = "bg-amber-500";
            }

            return {
                approved, draft, pending, amendment, noInfo, target: finalTarget,
                completionRate, statusLabel, statusColor, progressBg, unfinished: finalTarget - approved
            };
        }, [departments, targetSystem]);

        // Categories list
        const categories = ['Semua', 'Bahagian', 'IADA & Agensi', 'Pejabat', 'Unit', 'Lain-Lain'];

        const filteredDepartments = useMemo(() => {
            return departments.filter(dept => {
                const matchesSearch = dept.name.toLowerCase().includes(searchQuery.toLowerCase()) || dept.category.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesCategory = selectedCategory === 'Semua' || dept.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });
        }, [departments, searchQuery, selectedCategory]);

        const stellarPerformers = useMemo(() => departments.filter(d => d.approved === d.target && d.target > 0), [departments]);

        const focusAreas = useMemo(() => {
            return departments.filter(d => d.approved < d.target).map(d => ({
                ...d, backlog: d.target - d.approved, percentage: ((d.approved / d.target) * 100).toFixed(0)
            })).sort((a, b) => b.backlog - a.backlog).slice(0, 3);
        }, [departments]);

        const executeSlideAction = (action) => {
            if (action.actionType === 'category') {
                setSelectedCategory(action.value); setSearchQuery('');
                showNotification(`Menapis dashboard kepada: "${action.value}"`, 'info');
            } else if (action.actionType === 'search') {
                setSearchQuery(action.value); setSelectedCategory('Semua');
                showNotification(`Menapis dashboard carian: "${action.value}"`, 'info');
            } else if (action.actionType === 'reset') {
                setSelectedCategory('Semua'); setSearchQuery('');
            }
        };

        const simulateApproveDraft = (deptId) => {
            setDepartments(prev => prev.map(d => {
                if (d.id === deptId && d.draft > 0) return { ...d, draft: d.draft - 1, approved: d.approved + 1 };
                return d;
            }));
            showNotification(`Satu draf portfolio telah berjaya diluluskan!`, 'success');
        };

        const simulateSubmitDraft = (deptId) => {
            setDepartments(prev => prev.map(d => {
                if (d.id === deptId && d.noInfo > 0) return { ...d, noInfo: d.noInfo - 1, draft: d.draft + 1 };
                return d;
            }));
            showNotification(`Draf portfolio baharu dikemukakan!`, 'info');
        };

        const simulateApproveAllPending = () => {
            let count = 0;
            setDepartments(prev => prev.map(d => {
                if (d.pending > 0) { count += d.pending; return { ...d, approved: d.approved + d.pending, pending: 0 }; }
                return d;
            }));
            if (count > 0) showNotification(`Luluskan semua ${count} fail menunggu!`, 'success');
        };

        const resetSimulation = () => {
            setDepartments(INITIAL_DEPARTMENTS); setSelectedCategory('Semua'); setSearchQuery('');
            showNotification('Data diset semula ke rekod rasmi.', 'info');
        };

        const exportReport = () => {
            const csvContent = "data:text/csv;charset=utf-8," + "Bahagian,Sasaran,Diluluskan,Deraf,Menunggu Tindakan,Perlu Pindaan,Tiada Maklumat,Kadar Penyelesaian\n"
            + departments.map(d => `"${d.name}",${d.target},${d.approved},${d.draft},${d.pending},${d.amendment},${d.noInfo},${((d.approved/d.target)*100).toFixed(2)}%`).join("\n");
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Laporan_Status_MyPortfolio_KPKM_${new Date().getFullYear()}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        const donutData = useMemo(() => {
            const data = [
                { name: 'Telah Diluluskan', value: totals.approved, color: '#10b981' },
                { name: 'Deraf', value: totals.draft, color: '#f59e0b' },
                { name: 'Tindakan Pengesah', value: totals.pending, color: '#f97316' },
                { name: 'Perlu Pindaan', value: totals.amendment, color: '#ef4444' },
                { name: 'Tiada Maklumat', value: totals.noInfo, color: '#94a3b8' }
            ];
            const totalVal = data.reduce((sum, item) => sum + item.value, 0);
            
            let currentAngle = -90;
            return data.map(item => {
                const percentage = totalVal > 0 ? (item.value / totalVal) * 100 : 0;
                const angle = (item.value / totalVal) * 360;
                const startAngle = currentAngle; currentAngle += angle;
                return { ...item, percentage: percentage.toFixed(1), startAngle, endAngle: currentAngle };
            });
        }, [totals]);

        const currentSlide = SLIDES_DATA[currentSlideIndex];

        // Paparan Skrin Log Masuk Jika Belum Disahkan
        if (!isAuthenticated) {
            return (
                <div className="min-h-screen bg-slate-900 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-teal-900 via-slate-900 to-black flex flex-col items-center justify-center px-4">
                    <div className="bg-white/10 backdrop-blur-lg border border-white/20 p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center space-y-6 transform transition-all">
                        <div className="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto border border-emerald-400/50 shadow-inner">
                            <i className="fa-solid fa-shield-halved text-[30px] text-emerald-400"></i>
                        </div>
                        <div>
                            <h2 className="text-2xl font-black text-white tracking-tight">Akses Terhad</h2>
                            <p className="text-xs text-slate-300 mt-2">Sila masukkan Kod Akses staf untuk melihat Dashboard Eksekutif MyPortfolio.</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4 pt-2">
                            <div className="space-y-3">
                                <input 
                                    type="password" 
                                    value={accessCode}
                                    onChange={(e) => { setAccessCode(e.target.value); setAuthError(''); }}
                                    placeholder="Masukkan Kod..." 
                                    className="w-full text-center text-lg tracking-[0.3em] font-bold py-3 px-4 rounded-xl border border-white/20 bg-white/5 text-white placeholder-white/30 focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition"
                                />
                                {authError && <p className="text-[10px] text-rose-400 font-bold mt-2 animate-pulse">{authError}</p>}
                            </div>
                            <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl transition shadow-lg shadow-emerald-900/50 flex items-center justify-center gap-2">
                                <i className="fa-solid fa-lock-open text-[14px]"></i> Sahkan Akses
                            </button>
                        </form>
                        <p className="text-[9px] text-slate-500 uppercase tracking-widest pt-2">Sistem Rahsia Rasmi Kementerian</p>
                    </div>
                </div>
            );
        }

        return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-emerald-100 selection:text-emerald-800">
            
            {notification && (
                <div className="fixed top-5 right-5 z-50 flex items-center gap-3 p-4 rounded-xl shadow-2xl border bg-white animate-bounce">
                <div className={`p-2 rounded-lg ${ notification.type === 'success' ? 'bg-emerald-100 text-emerald-700' : notification.type === 'info' ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700'}`}>
                    {notification.type === 'success' ? <i className="fa-solid fa-circle-check text-[20px]"></i> : <i className="fa-solid fa-circle-exclamation text-[20px]"></i>}
                </div>
                <div><p className="text-sm font-semibold text-slate-900">{notification.message}</p></div>
                </div>
            )}

            <header className="bg-gradient-to-r from-emerald-950 via-emerald-800 to-teal-950 text-white shadow-lg relative overflow-hidden">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-teal-500/10 via-transparent to-transparent"></div>
                
                <div className="max-w-[1600px] mx-auto px-4 py-5 sm:px-6 lg:px-8 relative z-10">
                <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                    <div className="flex items-center gap-4">
                    
                    <div className="w-16 h-16 bg-white/95 rounded-xl shadow-inner flex items-center justify-center p-1.5 border border-emerald-500/30 shrink-0 relative">
                        {imageLoaded ? (
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Coat_of_arms_of_Malaysia.svg/500px-Coat_of_arms_of_Malaysia.svg.png" alt="Jata Negara Malaysia" className="w-full h-full object-contain" onError={() => setImageLoaded(false)} />
                        ) : ( <i className="fa-solid fa-building text-[32px] text-emerald-800"></i> )}
                    </div>

                    <div>

                        <thead>
                            <tr className="border-b border-slate-100 bg-slate-100/30 text-slate-400 font-bold uppercase text-[9px] tracking-wider">
                            <th className="py-3 px-4">Sektor / Bahagian</th>
                            <th className="py-3 px-2 text-center">Sasaran</th>
                            <th className="py-3 px-2 text-center text-emerald-700">Lulus</th>
                            <th className="py-3 px-2 text-center text-amber-700">Deraf</th>
                            <th className="py-3 px-2 text-center text-rose-700">Pindaan</th>
                            <th className="py-3 px-2 text-center">Belum Mula</th>
                            <th className="py-3 px-4 text-right">Aksi Simulasi</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-50">
                            {filteredDepartments.map((dept) => {
                            const isStellar = dept.approved === dept.target;
                            return (
                                <tr key={dept.id} className={`hover:bg-slate-50/70 transition ${ selectedDeptId === dept.id ? 'bg-emerald-50/45' : '' }`} onClick={() => setSelectedDeptId(dept.id)}>
                                <td className="py-3 px-4">
                                    <div className="flex items-center gap-2">
                                    <div className={`w-6 h-6 rounded-lg flex items-center justify-center font-bold text-[10px] shrink-0 ${ isStellar ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-700' }`}>
                                        <i className="fa-solid fa-building text-[11px]"></i>
                                    </div>
                                    <span className="font-bold text-slate-700 truncate max-w-[180px]" title={dept.name}>{dept.name}</span>
                                    </div>
                                </td>
                                <td className="py-3 px-2 text-center font-semibold text-slate-600">{dept.target}</td>
                                <td className="py-3 px-2 text-center font-bold text-emerald-600">{dept.approved}</td>
                                <td className="py-3 px-2 text-center font-semibold text-amber-500">{dept.draft}</td>
                                <td className="py-3 px-2 text-center font-semibold text-rose-500">{dept.amendment}</td>
                                <td className="py-3 px-2 text-center font-semibold text-slate-400">{dept.noInfo}</td>
                                <td className="py-3 px-4 text-right" onClick={(e) => e.stopPropagation()}>
                                    <div className="flex items-center justify-end gap-1.5">
                                    <button onClick={() => simulateApproveDraft(dept.id)} disabled={dept.draft === 0} className={`px-2 py-1 rounded text-[8px] font-bold transition ${ dept.draft === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' }`}>Lulus</button>
                                    <button onClick={() => simulateSubmitDraft(dept.id)} disabled={dept.noInfo === 0} className={`px-2 py-1 rounded text-[8px] font-bold transition ${ dept.noInfo === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-blue-100 text-blue-700 hover:bg-blue-200' }`}>Draf</button>
                                    </div>
                                </td>
                                </tr>
                            );
                            })}
                        </tbody>
                        </table>
                    </div>
                    </div>

                    <div className="bg-gradient-to-r from-emerald-50 to-teal-50 rounded-3xl border border-emerald-200 shadow-sm p-6 space-y-3">
                    <div className="flex items-start gap-3">
                        <div className="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center shrink-0">
                        <i className="fa-solid fa-lightbulb text-[18px] text-emerald-700"></i>
                        </div>
                        <div className="space-y-2">
                        <h4 className="font-black text-slate-800 text-sm">Fungsi Pemimpin Eksekutif</h4>
                        <div className="space-y-1.5 text-[10px] text-slate-600 leading-relaxed">
                            <p>✅ <strong>Simulasi Persetujuan Pukal:</strong> Klik "Lulus" untuk mensimulasikan kelulusan draf secara langsung dalam jadual.</p>
                            <p>✅ <strong>Maklumat Suara Bos Otomatis:</strong> Setiap perubahan slide memainkan mesej suara Bos anda secara automatik.</p>
                            <p>✅ <strong>Eksport Data:</strong> Muat turun laporan CSV untuk penyampaian pengurusan tertinggi.</p>
                            <p>✅ <strong>Kawalan Kelajuan Suara:</strong> Laras kelajuan mainkan 1x, 1.5x, atau 2x untuk kemudahan mendengarkan.</p>
                        </div>
                        </div>
                    </div>
                    </div>

                </section>

                </div>

            </main>
            </div>
        );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
